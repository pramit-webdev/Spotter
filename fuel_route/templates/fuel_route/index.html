<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotter | Smart Fuel Routing</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .search-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 8px;
            margin-left: 4px;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 18px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
        }

        .btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        .examples {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .example-chip {
            background: rgba(255,255,255,0.05);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .example-chip:hover {
            background: rgba(255,255,255,0.1);
            color: white;
            border-color: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Spotter</div>
        <div class="subtitle">AI-Powered Fuel Route Optimizer</div>

        <div class="search-card">
            <form action="/api/route/" method="get">
                <input type="hidden" name="ui" value="map">
                
                <div class="input-group">
                    <label>Start Location</label>
                    <input type="text" name="start" id="startInput" placeholder="e.g. Chicago, IL" required>
                </div>

                <div class="input-group">
                    <label>End Location</label>
                    <input type="text" name="end" id="endInput" placeholder="e.g. St. Louis, MO" required>
                </div>

                <button type="submit" class="btn">Optimize My Route</button>
            </form>

            <div class="examples">
                <div class="example-chip" onclick="setExample('Phoenix, AZ', 'Tucson, AZ')">Phoenix → Tucson</div>
                <div class="example-chip" onclick="setExample('Miami, FL', 'Orlando, FL')">Miami → Orlando</div>
                <div class="example-chip" onclick="setExample('New York, NY', 'Washington, DC')">NYC → DC</div>
            </div>
        </div>
    </div>

    <script>
        function setExample(start, end) {
            document.getElementById('startInput').value = start;
            document.getElementById('endInput').value = end;
        }
    </script>
</body>
</html>
